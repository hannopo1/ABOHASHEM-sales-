                    </div>
                    <div class="glass-light rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-green-400">${cust.total_paid.toLocaleString()}</div>
                        <div class="text-xs text-gray-400">إجمالي التحصيل</div>
                    </div>
                    <div class="glass-light rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-red-400">${cust.balance.toLocaleString()}</div>
                        <div class="text-xs text-gray-400">المديونية</div>
                    </div>
                    <div class="glass-light rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-purple-400">${cust.bonus_pct}%</div>
                        <div class="text-xs text-gray-400">Bonus</div>
                    </div>
                </div>
                <h4 class="font-bold mb-2">فواتير العميل</h4>
                <div class="overflow-x-auto" style="max-height:300px;overflow-y:auto">
                    <table class="data-table text-sm">
                        <thead><tr><th>رقم الفاتورة</th><th>التاريخ</th><th>الصنف</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead>
                        <tbody>
                            ${custInvoices.slice(0,20).map(i => `<tr><td>${i.invoice_no}</td><td>${i.date}</td><td>${i.product.substring(0,20)}</td><td>${i.qty}</td><td>${i.price}</td><td>${i.total.toLocaleString()}</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            document.getElementById('drillBody').innerHTML = html;
            document.getElementById('drillModal').style.display = 'block';
        }

        function closeDrill() {
            document.getElementById('drillModal').style.display = 'none';
        }

        // Search & Filter
        function filterCustomerTable() {
            const q = document.getElementById('customerSearch').value.toLowerCase();
            document.querySelectorAll('#customerTable tbody tr').forEach(row => {
                row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        function filterInvoiceTable() {
            const q = document.getElementById('invoiceSearch').value.toLowerCase();
            const status = document.getElementById('invoiceStatusFilter').value;
            document.querySelectorAll('#invoiceTable tbody tr').forEach(row => {
                const matchQ = row.textContent.toLowerCase().includes(q);
                let matchStatus = true;
                if(status === 'zero') matchStatus = row.classList.contains('zero-invoice');
                else if(status === 'paid') matchStatus = !row.classList.contains('zero-invoice') && !row.textContent.includes('صفرية');
                else if(status === 'unpaid') matchStatus = row.textContent.includes('نشطة');
                row.style.display = (matchQ && matchStatus) ? '' : 'none';
            });
        }

        function applyFilters() {
            // Placeholder for advanced filtering
        }

        // Export
        function exportCustomerTable() {
            let csv = 'العميل,المندوب,المبيعات,التحصيل,المديونية,الفواتير,متوسط الفاتورة,نسبة التحصيل,Bonus%\n';
            customerTable.forEach(c => { csv += `${c.name},${c.salesperson},${c.total_sales},${c.total_paid},${c.balance},${c.num_invoices},${c.avg_invoice},${c.collection_rate},${c.bonus_pct}\n`; });
            const blob = new Blob([csv], {type:'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='customers.csv'; a.click();
        }

        function exportCustomerPDF() {
            window.print();
        }

        function exportInvoiceExcel() {
            let csv = 'رقم الفاتورة,التاريخ,العميل,الصنف,الكمية,الكراتين,السعر,الإجمالي\n';
            invoiceTable.forEach(i => { csv += `${i.invoice_no},${i.date},${i.client},${i.product},${i.qty},${i.cartons},${i.price},${i.total}\n`; });
            const blob = new Blob([csv], {type:'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='invoices.csv'; a.click();
        }

        function exportDashboard() {
            exportCustomerTable();
            setTimeout(exportInvoiceExcel, 500);
        }

        // Init on load
        window.addEventListener('load', initCharts);
        window.addEventListener('resize', () => echarts.getInstanceByDom && document.querySelectorAll('[id$="Chart"]').forEach(el => { const c = echarts.getInstanceByDom(el); if(c) c.resize(); }));
    </script>
</body>
</html>
