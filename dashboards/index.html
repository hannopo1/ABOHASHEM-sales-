<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ابوهاشم للحوم — منصة الذكاء المالي والتشغيلي</title>
<script src="vendor/chart.umd.js"></script>
<script src="data.js"></script>
<style>
:root{
  --surface-1:#fcfcfb; --page:#f4f4f2; --text-primary:#0b0b0b; --text-secondary:#52514e;
  --muted:#898781; --grid:#e1e0d9; --axis:#c3c2b7; --border:rgba(11,11,11,0.10);
  --s1:#2a78d6; /* الهنا */ --s2:#1baf7a; /* ابوهاشم */ --s3:#eda100; /* اسبشيال */
  --s4:#008300; --s5:#4a3aa7; --s6:#e34948; --s7:#e87ba4; --s8:#eb6834;
  --good:#0ca30c; --warning:#c98500; --serious:#ec835a; --critical:#d03b3b;
  --card-radius:14px;
}
@media (prefers-color-scheme: dark){
  :root{
    --surface-1:#1a1a19; --page:#0d0d0d; --text-primary:#ffffff; --text-secondary:#c3c2b7;
    --muted:#898781; --grid:#2c2c2a; --axis:#383835; --border:rgba(255,255,255,0.10);
    --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300; --s5:#9085e9; --s6:#e66767; --s7:#d55181; --s8:#d95926;
    --good:#0ca30c; --warning:#fab219; --serious:#ec835a; --critical:#d03b3b;
  }
}
*{box-sizing:border-box;}
body{margin:0;background:var(--page);color:var(--text-primary);font-family:system-ui,-apple-system,"Segoe UI",Tahoma,sans-serif;font-variant-numeric:normal;}
header.top{background:var(--surface-1);border-bottom:1px solid var(--border);padding:18px 28px;position:sticky;top:0;z-index:50;}
.top-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.brand-title{font-size:20px;font-weight:800;}
.brand-sub{font-size:12.5px;color:var(--text-secondary);margin-top:2px;}
nav.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;}
nav.tabs button{background:transparent;border:1px solid var(--border);color:var(--text-secondary);
  padding:8px 14px;border-radius:999px;font-size:13.5px;cursor:pointer;font-family:inherit;transition:all .15s;}
nav.tabs button:hover{background:var(--grid);}
nav.tabs button.active{background:var(--s1);color:#fff;border-color:var(--s1);font-weight:700;}
main{padding:22px 28px 60px;max-width:1400px;margin:0 auto;}
section.panel{display:none;}
section.panel.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
h2.panel-title{font-size:19px;margin:0 0 4px;}
p.panel-sub{color:var(--text-secondary);font-size:13px;margin:0 0 18px;}
.grid{display:grid;gap:16px;}
.grid.kpi{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));}
.grid.two{grid-template-columns:repeat(2,1fr);}
.grid.three{grid-template-columns:repeat(3,1fr);}
@media (max-width:900px){.grid.two,.grid.three{grid-template-columns:1fr;}}
.card{background:var(--surface-1);border:1px solid var(--border);border-radius:var(--card-radius);padding:16px 18px;}
.kpi .card{padding:14px 16px;}
.kpi .label{font-size:12px;color:var(--text-secondary);margin-bottom:6px;}
.kpi .value{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;}
.kpi .delta{font-size:12px;margin-top:4px;}
.kpi .delta.good{color:var(--good);}
.kpi .delta.critical{color:var(--critical);}
.kpi .delta.muted{color:var(--muted);}
.card h3{font-size:14.5px;margin:0 0 12px;font-weight:700;}
.card .note{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5;}
.chart-wrap{position:relative;height:280px;}
.chart-wrap.tall{height:360px;}
.chart-wrap.short{height:200px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
table.tabular td, table.tabular th{font-variant-numeric:tabular-nums;}
th{text-align:right;color:var(--text-secondary);font-weight:700;font-size:12px;border-bottom:1px solid var(--grid);padding:8px 6px;}
td{padding:7px 6px;border-bottom:1px solid var(--grid);}
tr:hover td{background:var(--grid);}
.tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700;}
.tag.A{background:rgba(42,120,214,.15);color:var(--s1);}
.tag.B{background:rgba(237,161,0,.18);color:var(--warning);}
.tag.C{background:rgba(137,135,129,.18);color:var(--muted);}
.tag.X{background:rgba(27,175,122,.15);color:var(--s2);}
.tag.Y{background:rgba(237,161,0,.18);color:var(--warning);}
.tag.Z{background:rgba(211,59,59,.14);color:var(--critical);}
.callout{border-radius:var(--card-radius);padding:14px 16px;font-size:13px;line-height:1.7;}
.callout.info{background:rgba(42,120,214,.08);border:1px solid rgba(42,120,214,.25);}
.callout.warn{background:rgba(211,59,59,.08);border:1px solid rgba(211,59,59,.25);}
.scroll-x{overflow-x:auto;}
.legend-row{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--text-secondary);margin-top:8px;}
.legend-row .dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-left:5px;}
.tree{font-size:13px;}
.tree details{border-bottom:1px solid var(--grid);}
.tree summary{cursor:pointer;padding:8px 4px;display:flex;justify-content:space-between;gap:8px;list-style:none;}
.tree summary::-webkit-details-marker{display:none;}
.tree summary::before{content:"▸";display:inline-block;margin-left:8px;color:var(--muted);transition:transform .15s;}
.tree details[open]>summary::before{transform:rotate(90deg);}
.tree .node-name{font-weight:600;}
.tree .node-meta{color:var(--text-secondary);font-variant-numeric:tabular-nums;font-size:12px;white-space:nowrap;}
.tree .level-2{padding-right:18px;}
.tree .level-3{padding-right:36px;font-size:12.5px;}
.tree .bar-bg{height:5px;background:var(--grid);border-radius:3px;margin-top:4px;overflow:hidden;}
.tree .bar-fill{height:100%;background:var(--s1);}
input.search{width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--border);background:var(--page);
  color:var(--text-primary);font-size:13px;margin-bottom:10px;font-family:inherit;}
.treemap{display:flex;flex-wrap:wrap;gap:2px;height:320px;}
.treemap .cell{display:flex;align-items:flex-end;padding:6px;color:#fff;font-size:11.5px;border-radius:4px;overflow:hidden;position:relative;}
.heat-table td{text-align:center;font-size:11.5px;color:#fff;font-variant-numeric:tabular-nums;}
.heat-table th{font-size:11px;}
.footer-note{color:var(--muted);font-size:11.5px;margin-top:40px;padding-top:16px;border-top:1px solid var(--border);line-height:1.8;}
.badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.small-mult-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media (max-width:900px){.small-mult-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div>
      <div class="brand-title">أبوهاشم للحوم — Food Industries</div>
      <div class="brand-sub">منصة الذكاء المالي والتشغيلي المتكاملة · مبنية بالكامل من الملفات المرفوعة (فواتير المبيعات، تصنيف الأصناف، سعة الكرتونة، مديونية العملاء) · الفترة: 2025-01-01 إلى 2026-06-30 · لقطة المديونية: 2026-07-04</div>
    </div>
  </div>
  <nav class="tabs" id="tabnav"></nav>
</header>

<main id="app"></main>

<script>
const D = window.DASH_DATA;
const fmt0 = n => n==null? '—' : Math.round(n).toLocaleString('en-US');
const fmt1 = n => n==null? '—' : n.toLocaleString('en-US',{maximumFractionDigits:1,minimumFractionDigits:1});
const fmt2 = n => n==null? '—' : n.toLocaleString('en-US',{maximumFractionDigits:2,minimumFractionDigits:2});
const fmtPct = n => n==null? '—' : n.toLocaleString('en-US',{maximumFractionDigits:1})+'%';
const fmtEGP = n => n==null? '—' : fmt0(n)+' ج.م';
const monthAr = m => {
  const names=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  const [y,mo]=m.split('-'); return names[parseInt(mo)-1]+' '+y;
};
const PALETTE = ['#2a78d6','#1baf7a','#eda100','#008300','#4a3aa7','#e34948','#e87ba4','#eb6834'];
Chart.defaults.font.family = "system-ui,-apple-system,'Segoe UI',Tahoma,sans-serif";
Chart.defaults.color = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#52514e';
Chart.defaults.borderColor = '#e1e0d9';

const TABS = [
  {id:'exec-fin', label:'الملخص المالي التنفيذي'},
  {id:'exec-sales', label:'المبيعات التنفيذي'},
  {id:'customer', label:'ربحية العملاء'},
  {id:'brand', label:'أداء العلامات التجارية'},
  {id:'product', label:'أداء المنتجات'},
  {id:'mfg', label:'التصنيع والتعبئة'},
  {id:'forecast', label:'التنبؤ 7 أشهر'},
  {id:'dq', label:'جودة البيانات'},
];

function renderTabs(){
  const nav = document.getElementById('tabnav');
  nav.innerHTML = TABS.map((t,i)=>`<button data-tab="${t.id}" class="${i===0?'active':''}">${t.label}</button>`).join('');
  nav.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=> switchTab(btn.dataset.tab));
  });
}
function switchTab(id){
  document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===id));
  document.querySelectorAll('section.panel').forEach(s=>s.classList.toggle('active', s.id===id));
}
renderTabs();
</script>

<script src="tab_exec_financial.js"></script>
<script src="tab_exec_sales.js"></script>
<script src="tab_customer.js"></script>
<script src="tab_brand.js"></script>
<script src="tab_product.js"></script>
<script src="tab_manufacturing.js"></script>
<script src="tab_forecast.js"></script>
<script src="tab_dataquality.js"></script>

<script>
document.addEventListener('DOMContentLoaded', ()=>{
  const app = document.getElementById('app');
  app.innerHTML = [
    renderExecFinancial(), renderExecSales(), renderCustomer(), renderBrand(),
    renderProduct(), renderManufacturing(), renderForecast(), renderDataQuality()
  ].join('\n');
  document.querySelectorAll('section.panel')[0].classList.add('active');
  mountExecFinancial(); mountExecSales(); mountCustomer(); mountBrand();
  mountProduct(); mountManufacturing(); mountForecast(); mountDataQuality();
});
</script>

</body>
</html>
